name: Deploy to DigitalOcean Droplet

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@master
        with:
          host: 178.128.203.40
          username: root
          key: ${{ secrets.DO_SSH_KEY }}
          script: |
            cd /var/www/onai-integrator-login
            git pull origin main
            npm install
            # Ensure .env exists
            if [ ! -f .env ]; then
              echo "Creating .env file..."
              echo 'VITE_SUPABASE_URL=https://capdjvokjdivxjfdddmx.supabase.co' > .env
              echo 'VITE_SUPABASE_PUBLISHABLE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImNhcGRqdm9ramRpdnhqZmRkZG14Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjIxNjc5MDUsImV4cCI6MjA3Nzc0MzkwNX0.bsikIoF86BjthWauzbLXq3SZbNQFodppZ2TC64NniJs' >> .env
              echo 'VITE_SITE_URL=https://integratoronai.kz' >> .env
            fi
            npm run build
            # Setup Nginx for SPA routing
            echo "Configuring Nginx for SPA..."
            cat > /etc/nginx/sites-available/onai-integrator-login.conf <<'NGINX_EOF'
            server {
                listen 80;
                server_name integratoronai.kz www.integratoronai.kz;

                root /var/www/onai-integrator-login/dist;
                index index.html;

                # SPA routing - serve index.html for all routes
                location / {
                    try_files $uri $uri/ /index.html;
                }

                # Static files caching
                location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|woff2?|ttf)$ {
                    try_files $uri =404;
                    access_log off;
                    add_header Cache-Control "public, max-age=31536000, immutable";
                }
            }
            NGINX_EOF
            ln -sf /etc/nginx/sites-available/onai-integrator-login.conf /etc/nginx/sites-enabled/
            nginx -t && systemctl reload nginx
            echo "✅ Nginx configured for SPA routing"
            pm2 restart onai-app || pm2 start npm --name "onai-app" -- run serve
            pm2 save
            echo "✅ Deployed successfully to DigitalOcean!"

